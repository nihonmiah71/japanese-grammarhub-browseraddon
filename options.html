<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Grammar Add-on Settings</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 30px; max-width: 1000px; margin: auto; background-color: #f5f6fa; color: #2f3640; }
    h2 { color: #2f3542; border-bottom: 2px solid #74b9ff; padding-bottom: 10px; margin-bottom: 20px; }
    .sticky-bar { position: sticky; top: 0; background: #f5f6fa; padding: 10px 0; z-index: 100; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #dcdde1; }
    .group { background: white; border: 1px solid #dcdde1; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    h3 { margin-top: 0; color: #57606f; font-size: 16px; text-transform: uppercase; letter-spacing: 0.5px; display: flex; justify-content: space-between; align-items: center; }
    .level-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; }
    label { background: #f1f2f6; padding: 8px 12px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; font-size: 13px; transition: background 0.2s; border: 1px solid #dfe4ea; user-select: none; }
    label:hover { background: #dfe4ea; }
    input[type="checkbox"] { margin-right: 8px; transform: scale(1.1); cursor: pointer; }
    button { padding: 10px 18px; cursor: pointer; font-weight: bold; border: none; border-radius: 6px; background-color: #74b9ff; color: white; transition: background 0.2s; }
    button:hover { background-color: #0984e3; }
    #save { background-color: #2ed573; font-size: 16px; padding: 12px 24px; }
    #save:hover { background-color: #26af5f; }
    .global-actions button { background-color: #747d8c; }
    .global-actions button:hover { background-color: #2f3542; }
    #status { color: #2ed573; font-weight: bold; font-size: 16px; }
    .loading { font-style: italic; color: #a4b0be; }
  </style>
</head>
<body>

  <h2>Japanese Grammar Filter Settings</h2>

  <div class="sticky-bar">
    <button id="save">Save Settings</button>
    <div class="global-actions">
      <button id="all">Activate All</button>
      <button id="none">Deactivate All</button>
    </div>
    <span id="status"></span>
  </div>

  <div class="group" id="tag-management-container" style="background: #f8f9fa; border: 1px dashed #74b9ff;">
    <h3>Activate/Deactivate Groups by Tags</h3>
    <div id="tag-buttons-grid" style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px;"></div>
    
    <hr style="border: 0; border-top: 1px solid #dcdde1; margin: 15px 0;">
    
    <h3>Compare Selected Grammar Points</h3>
    <div style="display: flex; gap: 10px; align-items: center;">
      <button id="contrast-grammars" style="background-color: #eccc68; color: #2f3542; font-size: 16px; padding: 12px 24px;">Contrast Grammars</button>
    </div>
  </div>

  <div id="grammar-container">
    <div class="loading">Loading local grammar data...</div>
  </div>

  <script src="options.js"></script>
</body>
</html>
